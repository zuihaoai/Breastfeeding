<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#FFF8EF"/>
  <text x="120" y="120" fill="#8B4513" font-size="60" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">配方奶冲泡步骤</text>
  <rect x="120" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="520" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="920" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="1320" y="230" width="160" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <text x="186" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">洗手消毒</text>
  <text x="566" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">烧水放凉</text>
  <text x="953" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">按说明冲泡</text>
  <text x="1338" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">及时喂完</text>
  <path d="M420 315H500" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <path d="M820 315H900" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <path d="M1220 315H1300" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <text x="120" y="505" fill="#8B4513" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">提醒</text>
  <text x="120" y="570" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">1. 冲泡比例必须按说明书，不能凭感觉。</text>
  <text x="120" y="620" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">2. 水温、保存和弃置时间都要有标准。</text>
  <text x="120" y="670" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">3. 这类图的目标是降低风险，不是鼓励替代母乳。</text>
</svg>
