<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#FFF8EF"/>
  <text x="120" y="120" fill="#8B4513" font-size="60" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">用药与哺乳判断流程</text>
  <rect x="120" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="520" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="920" y="230" width="300" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <rect x="1320" y="230" width="160" height="170" rx="30" fill="#FFE7C2" stroke="#D97706" stroke-width="4"/>
  <text x="185" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">需要吃药吗？</text>
  <text x="565" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">看药名和剂量</text>
  <text x="955" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">查哺乳风险</text>
  <text x="1340" y="295" fill="#5C3410" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">再决定</text>
  <path d="M420 315H500" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <path d="M820 315H900" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <path d="M1220 315H1300" stroke="#D97706" stroke-width="10" stroke-linecap="round"/>
  <text x="120" y="500" fill="#8B4513" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">原则</text>
  <text x="120" y="565" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">1. 大多数药物并不等于必须停母乳。</text>
  <text x="120" y="615" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">2. 风险高的药，优先咨询医生或药师。</text>
  <text x="120" y="665" fill="#5C3410" font-size="26" font-family="Arial, 'PingFang SC', sans-serif">3. 不要靠“听说”做决定，靠可核实信息。</text>
</svg>
